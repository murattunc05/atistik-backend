name: Atistik Daily Automation

on:
  schedule:
    # 06:30 Europe/Istanbul early fallback for delayed/missed GitHub schedules
    - cron: "30 3 * * *"
    # 09:30 Europe/Istanbul
    - cron: "30 6 * * *"
    # 22:45 Europe/Istanbul
    - cron: "45 19 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Automation mode"
        required: true
        default: "analyze-dry-run"
        type: choice
        options:
          - analyze-dry-run
          - analyze
          - results-dry-run
          - results
          - replay-results
          - evaluate-gate
      date:
        description: "Run date: YYYY-MM-DD, DD.MM.YYYY, or DD/MM/YYYY. Empty = today in Istanbul."
        required: false
        default: ""
      replay_race_id:
        description: "Optional race_id for replay-results"
        required: false
        default: ""
      max_attempts:
        description: "Optional result retry attempts. Empty = scheduled results use 5, manual runs use 1."
        required: false
        default: ""
      strict_gate:
        description: "Fail evaluation gate on WARN/REVIEW as well as FAIL."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: atistik-daily-automation
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ATISTIK_BACKEND_URL: ${{ secrets.ATISTIK_BACKEND_URL }}
      ML_DATA_REPO: ${{ secrets.ML_DATA_REPO }}
      ML_DATA_TOKEN: ${{ secrets.ML_DATA_TOKEN }}
      REPLAY_RACE_ID: ${{ inputs.replay_race_id }}

    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Checkout ML data repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ML_DATA_REPO }}
          token: ${{ secrets.ML_DATA_TOKEN }}
          path: ml-data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve mode and date
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          MODE="${{ inputs.mode }}"
          SCHEDULE="${{ github.event.schedule }}"
          if [[ -z "$MODE" ]]; then
            if [[ "$SCHEDULE" == "30 3 * * *" || "$SCHEDULE" == "30 6 * * *" ]]; then
              MODE="analyze"
            elif [[ "$SCHEDULE" == "45 19 * * *" ]]; then
              MODE="results"
            else
              MODE="analyze-dry-run"
            fi
          fi

          RUN_DATE="${{ inputs.date }}"
          if [[ -z "$RUN_DATE" ]]; then
            # GitHub scheduled jobs may start late. If the 22:45 Istanbul
            # results job starts after midnight, it still belongs to the
            # previous race day.
            LOCAL_HOUR="$(TZ=Europe/Istanbul date +%H)"
            LOCAL_HOUR_NUM=$((10#$LOCAL_HOUR))
            if [[ "$SCHEDULE" == "45 19 * * *" && "$LOCAL_HOUR_NUM" -lt 6 ]]; then
              RUN_DATE="$(TZ=Europe/Istanbul date -d 'yesterday' +%Y-%m-%d)"
            else
              RUN_DATE="$(TZ=Europe/Istanbul date +%Y-%m-%d)"
            fi
          fi

          MAX_ATTEMPTS="1"
          INPUT_MAX_ATTEMPTS="${{ inputs.max_attempts }}"
          if [[ -n "$INPUT_MAX_ATTEMPTS" ]]; then
            MAX_ATTEMPTS="$INPUT_MAX_ATTEMPTS"
          elif [[ "$MODE" == "results" && -n "$SCHEDULE" ]]; then
            MAX_ATTEMPTS="5"
          fi

          BACKEND_URL="${ATISTIK_BACKEND_URL:-https://atistik-backend.onrender.com}"
          STRICT_GATE="${{ inputs.strict_gate }}"
          if [[ "$STRICT_GATE" != "true" ]]; then
            STRICT_GATE="false"
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "date=$RUN_DATE" >> "$GITHUB_OUTPUT"
          echo "max_attempts=$MAX_ATTEMPTS" >> "$GITHUB_OUTPUT"
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"
          echo "strict_gate=$STRICT_GATE" >> "$GITHUB_OUTPUT"

      - name: Install evaluation dependencies
        if: steps.resolve.outputs.mode == 'results' || steps.resolve.outputs.mode == 'evaluate-gate'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run automation
        shell: bash
        run: |
          set +e
          STRICT_GATE_ARGS=()
          if [[ "${{ steps.resolve.outputs.mode }}" == "evaluate-gate" && "${{ steps.resolve.outputs.strict_gate }}" == "true" ]]; then
            STRICT_GATE_ARGS+=(--strict-gate)
          fi
          python automation/atistik_daily_job.py \
            --mode "${{ steps.resolve.outputs.mode }}" \
            --date "${{ steps.resolve.outputs.date }}" \
            --backend-url "${{ steps.resolve.outputs.backend_url }}" \
            --data-dir "$GITHUB_WORKSPACE/ml-data" \
            --max-attempts "${{ steps.resolve.outputs.max_attempts }}" \
            "${STRICT_GATE_ARGS[@]}"
          automation_status="$?"
          if [[ "${{ steps.resolve.outputs.mode }}" == "evaluate-gate" ]]; then
            echo "EVALUATION_GATE_EXIT=$automation_status" >> "$GITHUB_ENV"
            exit 0
          fi
          exit "$automation_status"

      - name: Run v4.18 evaluation gate
        if: steps.resolve.outputs.mode == 'results'
        shell: bash
        run: |
          set +e
          STRICT_GATE_ARGS=()
          if [[ "${{ steps.resolve.outputs.strict_gate }}" == "true" ]]; then
            STRICT_GATE_ARGS+=(--strict-gate)
          fi
          python automation/atistik_daily_job.py \
            --mode evaluate-gate \
            --date "${{ steps.resolve.outputs.date }}" \
            --backend-url "${{ steps.resolve.outputs.backend_url }}" \
            --data-dir "$GITHUB_WORKSPACE/ml-data" \
            "${STRICT_GATE_ARGS[@]}"
          gate_status="$?"
          echo "EVALUATION_GATE_EXIT=$gate_status" >> "$GITHUB_ENV"
          exit 0

      - name: Commit automation reports
        shell: bash
        working-directory: ml-data
        run: |
          set -euo pipefail
          git config user.name "atistik-automation"
          git config user.email "atistik-automation@users.noreply.github.com"

          if ! git diff --quiet -- automation || [[ -n "$(git ls-files --others --exclude-standard automation)" ]]; then
            git stash push --include-untracked --message "automation-report" -- automation
            git pull --rebase origin main
            git stash pop
          else
            git pull --rebase origin main
          fi

          git add automation
          if git diff --cached --quiet; then
            echo "No automation report changes."
          else
            git commit -m "Atistik automation ${{ steps.resolve.outputs.mode }} ${{ steps.resolve.outputs.date }}"
            for attempt in 1 2 3 4 5; do
              if git push; then
                break
              fi
              if [[ "$attempt" == "5" ]]; then
                echo "Failed to push automation report after $attempt attempts."
                exit 1
              fi
              echo "Push rejected, rebasing on latest ml-data main and retrying ($attempt/5)."
              git pull --rebase origin main
              sleep 5
            done
          fi

      - name: Fail on evaluation gate failure
        if: env.EVALUATION_GATE_EXIT != '' && env.EVALUATION_GATE_EXIT != '0'
        shell: bash
        run: |
          echo "v4.18 evaluation gate failed with exit code $EVALUATION_GATE_EXIT"
          exit "$EVALUATION_GATE_EXIT"
