name: Atistik Render Fallback

on:
  schedule:
    # 07:45 Europe/Istanbul: use Render only if Raspberry did not publish analysis.
    - cron: "45 4 * * *"
    # 23:40 Europe/Istanbul: use Render only if Raspberry did not publish results.
    - cron: "40 20 * * *"
  workflow_dispatch:
    inputs:
      kind:
        description: "Fallback type"
        required: true
        default: "analyze"
        type: choice
        options:
          - analyze
          - results
      date:
        description: "Run date: YYYY-MM-DD, DD.MM.YYYY, or DD/MM/YYYY. Empty = today in Istanbul."
        required: false
        default: ""
      max_attempts:
        description: "Optional fallback retry attempts."
        required: false
        default: "1"

permissions:
  contents: read

concurrency:
  group: atistik-render-fallback
  cancel-in-progress: false

jobs:
  fallback:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ML_DATA_REPO: ${{ secrets.ML_DATA_REPO }}
      ML_DATA_TOKEN: ${{ secrets.ML_DATA_TOKEN }}
      ATISTIK_RENDER_BACKEND_URL: ${{ secrets.ATISTIK_RENDER_BACKEND_URL }}

    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Checkout ML data repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ML_DATA_REPO }}
          token: ${{ secrets.ML_DATA_TOKEN }}
          path: ml-data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve fallback mode, date, and backend
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          KIND="${{ inputs.kind }}"
          SCHEDULE="${{ github.event.schedule }}"
          if [[ -z "$KIND" ]]; then
            if [[ "$SCHEDULE" == "45 4 * * *" ]]; then
              KIND="analyze"
            elif [[ "$SCHEDULE" == "40 20 * * *" ]]; then
              KIND="results"
            else
              KIND="analyze"
            fi
          fi

          RUN_DATE="${{ inputs.date }}"
          if [[ -z "$RUN_DATE" ]]; then
            LOCAL_HOUR="$(TZ=Europe/Istanbul date +%H)"
            LOCAL_HOUR_NUM=$((10#$LOCAL_HOUR))
            if [[ "$KIND" == "results" && "$LOCAL_HOUR_NUM" -lt 6 ]]; then
              RUN_DATE="$(TZ=Europe/Istanbul date -d 'yesterday' +%Y-%m-%d)"
            else
              RUN_DATE="$(TZ=Europe/Istanbul date +%Y-%m-%d)"
            fi
          fi

          MAX_ATTEMPTS="${{ inputs.max_attempts }}"
          if [[ -z "$MAX_ATTEMPTS" ]]; then
            if [[ "$KIND" == "results" ]]; then
              MAX_ATTEMPTS="5"
            else
              MAX_ATTEMPTS="1"
            fi
          fi

          BACKEND_URL="${ATISTIK_RENDER_BACKEND_URL:-https://atistik-backend.onrender.com}"
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"
          echo "date=$RUN_DATE" >> "$GITHUB_OUTPUT"
          echo "max_attempts=$MAX_ATTEMPTS" >> "$GITHUB_OUTPUT"
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Run fallback checker
        shell: bash
        run: |
          python automation/fallback_checker.py \
            --kind "${{ steps.resolve.outputs.kind }}" \
            --date "${{ steps.resolve.outputs.date }}" \
            --backend-url "${{ steps.resolve.outputs.backend_url }}" \
            --data-dir "$GITHUB_WORKSPACE/ml-data" \
            --max-attempts "${{ steps.resolve.outputs.max_attempts }}" \
            --allow-render-run

      - name: Commit fallback reports
        shell: bash
        working-directory: ml-data
        run: |
          set -euo pipefail
          git config user.name "atistik-fallback"
          git config user.email "atistik-fallback@users.noreply.github.com"

          if ! git diff --quiet -- automation || [[ -n "$(git ls-files --others --exclude-standard automation)" ]]; then
            git stash push --include-untracked --message "fallback-report" -- automation
            git pull --rebase origin main
            git stash pop
          else
            git pull --rebase origin main
          fi

          git add automation
          if git diff --cached --quiet; then
            echo "No fallback report changes."
          else
            git commit -m "Atistik Render fallback ${{ steps.resolve.outputs.kind }} ${{ steps.resolve.outputs.date }}"
            for attempt in 1 2 3 4 5; do
              if git push; then
                break
              fi
              if [[ "$attempt" == "5" ]]; then
                echo "Failed to push fallback report after $attempt attempts."
                exit 1
              fi
              git pull --rebase origin main
              sleep 5
            done
          fi
