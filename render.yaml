services:
  - type: web
    name: atistik-api
    runtime: python
    buildCommand: apt-get update && apt-get install -y libgomp1 && pip install -r requirements.txt
    startCommand: gunicorn api_server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free
    healthCheckPath: /health
